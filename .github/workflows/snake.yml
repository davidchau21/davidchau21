name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"   # Chạy mỗi 12 tiếng
  workflow_dispatch:           # Chạy thủ công khi cần
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Generate snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#00E5CC&color_dots=#0d1117,#203a43,#2c5364,#00b09b,#00E5CC
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#00E5CC&color_dots=#0d1117,#203a43,#2c5364,#00b09b,#00E5CC

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

